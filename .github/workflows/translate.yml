name: Auto Translate

on:
  schedule:
    - cron: '0 2 * * *' # 매일 오전 2시 UTC
  workflow_dispatch: # 수동 실행

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: mdx
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run translation script
        run: pnpm translate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push if new translations exist
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/mdx/translate/
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            {
              echo "titles<<EOF"
              git diff --staged --name-only -- content/mdx/translate/ | sed 's|.*/||; s/\.[^.]*$//; s/^/- /'
              echo "EOF"
            } >> $GITHUB_OUTPUT
            git commit -m "Content: 기술 블로그 자동 번역"
            git push origin mdx
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR and enable auto-merge
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_URL=$(gh pr list --head mdx --base main --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            BODY_FILE=$(mktemp)
            printf "자동 번역 스크립트에 의해 생성된 PR입니다.\n\n## 번역된 콘텐츠\n" > "$BODY_FILE"
            echo "${{ steps.commit.outputs.titles }}" >> "$BODY_FILE"
            PR_URL=$(gh pr create \
              --base main \
              --head mdx \
              --title "Content: 기술 블로그 자동 번역" \
              --body-file "$BODY_FILE" \
              --label "콘텐츠")
          fi
          gh pr merge --auto --merge "$PR_URL"
